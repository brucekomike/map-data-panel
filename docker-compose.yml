version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/app.db:/app/app.db
    environment:
      - DATABASE_URL=sqlite:///./app.db

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
